
services:
  mysql:
    image: mysql:8
    container_name: posts_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: postsdb
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: posts_backend
    restart: always
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: postsdb
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: posts_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data: